<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 【终极视口物理锁定】：maximum-scale=1.0, user-scalable=0 彻底禁止任何移动浏览器恶意自动放大 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>blogs.nyc.mn - 后台控制面板</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- Vditor 视觉编辑器 -->
    <link rel="stylesheet" href="https://unpkg.com/vditor/dist/index.css" />
    <script src="https://unpkg.com/vditor/dist/index.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        /* 【现代响应式滚动与视口锁定】：采用 100dvh 动态视口，完美适配手机底端导航栏与旋转变化 */
        html, body { height: 100dvh; height: 100dvh; overflow: hidden; background-color: #f7f9fb; }
        .vditor { border-color: #e2e8f0 !important; border-radius: 12px !important; }
        .vditor-toolbar { border-bottom-color: #f1f5f9 !important; background-color: #fafafa !important; border-radius: 12px 12px 0 0 !important; }
        .vditor-content { background: #fff !important; }
    </style>
</head>
<body class="text-zinc-800 font-sans flex antialiased h-[100dvh]">

    <!-- 1. 登录面板 (奶油之家深度视觉美化重构 - 输入框已全线配置 text-[16px] 彻底防止 iOS 放大) -->
    <div id="admin-login-view" class="fixed inset-0 bg-[#f7f9fb] flex items-center justify-center z-50 overflow-y-auto">
        <div class="max-w-md w-full mx-4 bg-white p-8 rounded-2xl border border-zinc-100 shadow-xl space-y-6">
            <div class="text-center">
                <div class="w-14 h-14 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-amber-500/20">
                    <span class="text-2xl">👤</span>
                </div>
                <h2 class="text-xl font-bold tracking-tight text-zinc-900">Blogs 奶油管理后台</h2>
                <p class="text-xs text-zinc-400 mt-1.5 leading-relaxed">请输入您在 D1 数据库中配置的管理密码解锁系统</p>
            </div>
            <div class="space-y-4">
                <input type="password" id="admin-pass" class="w-full border border-zinc-200 rounded-xl px-4 py-3 text-[16px] focus:ring-4 focus:ring-amber-500/10 focus:border-amber-500 focus:outline-none transition-all duration-300" placeholder="请输入您的密码 (默认: admin123)">
                <button onclick="verifyAndLogin()" class="w-full bg-zinc-900 hover:bg-zinc-800 text-white py-3 rounded-xl text-sm font-semibold tracking-wide shadow-md hover:shadow-lg transition-all duration-300">
                    确认解锁控制台
                </button>
            </div>
        </div>
    </div>

    <!-- 2. 控制台 (已解锁，左右分栏) -->
    <div id="admin-main-view" class="hidden w-full h-full flex relative overflow-hidden">
        
        <!-- 移动端遮罩层 -->
        <div id="sidebar-overlay" onclick="toggleMobileSidebar()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden transition-all duration-300"></div>
        
        <!-- 左侧导航侧边栏 (升级：奶油磨砂高亮玻璃设计 bg-white/70 backdrop-blur-xl border-r) -->
        <aside class="fixed md:static inset-y-0 left-0 w-64 bg-white/70 backdrop-blur-xl border-r border-zinc-200/50 text-zinc-700 flex flex-col justify-between p-6 shrink-0 h-full z-50 -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="space-y-6">
                <!-- 头部品牌 (D1 动态绑定) -->
                <div class="flex flex-col border-b border-zinc-100 pb-5">
                    <div class="flex items-center space-x-2 mb-4">
                        <span class="w-3.5 h-3.5 bg-amber-500 rounded-full"></span>
                        <span id="sidebar-site-title" class="text-sm font-bold tracking-tight text-zinc-900 line-clamp-1">blogs.nyc.mn 后台</span>
                    </div>
                    <!-- 一键极客返回前台 -->
                    <a href="./" target="_blank" class="w-full flex items-center justify-center space-x-2 px-3 py-2.5 rounded-lg text-xs font-semibold text-zinc-500 hover:text-zinc-900 bg-zinc-50 hover:bg-zinc-100 transition-all border border-zinc-200/60">
                        <span>🏠</span> <span>打开网站前台 ↗</span>
                    </a>
                </div>
                
                <!-- 侧边栏菜单 -->
                <nav class="space-y-1">
                    <button id="menu-btn-posts" onclick="switchTab('panel-posts')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-sm font-bold tracking-wide transition-all bg-amber-500/10 text-amber-600 border border-amber-500/20 shadow-sm">
                        <span>📂</span> <span class="tracking-wider">文章列表管理</span>
                    </button>
                    <button id="menu-btn-editor" onclick="switchTab('panel-editor')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-sm font-medium transition-all text-zinc-600 hover:bg-zinc-100 hover:text-zinc-900 border border-transparent">
                        <span>✍️</span> <span class="tracking-wider">撰写新教程</span>
                    </button>
                    <button id="menu-btn-config" onclick="switchTab('panel-config')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-sm font-medium transition-all text-zinc-600 hover:bg-zinc-100 hover:text-zinc-900 border border-transparent">
                        <span>⚙️</span> <span class="tracking-wider">站点全局配置</span>
                    </button>
                </nav>
            </div>

            <!-- 底端用户信息与退出 -->
            <div class="border-t border-zinc-100 pt-5 space-y-3">
                <div class="flex items-center justify-between text-xs text-zinc-400 px-2">
                    <span>系统状态: 运行正常</span>
                    <button onclick="showChangePasswordModal()" class="hover:text-amber-500 underline transition-colors">改密</button>
                </div>
                <button onclick="logoutAdmin()" class="w-full bg-red-50 text-red-600 hover:bg-red-100 py-2 rounded-lg text-xs font-semibold transition-all">
                    退出登录
                </button>
            </div>
        </aside>

        <!-- 右侧主工作区 (自适应滚动，内部配备 7xl 宽幅居中容器) -->
        <main class="flex-grow p-8 overflow-y-auto h-full">
            <!-- 升级为 7xl 超舒展容器，方便大表格和编辑器排版 -->
            <div class="max-w-7xl mx-auto w-full space-y-8 pb-12">

                <!-- 面板 A：文章列表管理 -->
                <div id="panel-posts" class="admin-panel-content space-y-6">
                    <div class="border-b border-zinc-100 pb-3">
                        <h2 class="text-xl font-bold text-zinc-900 tracking-tight">文章列表管理</h2>
                        <p class="text-xs text-zinc-400 mt-1">管理、修改、删除和一键筛选已发布的文章</p>
                    </div>

                    <!-- 组合筛选条 -->
                    <div class="grid grid-cols-1 sm:grid-cols-4 gap-4 bg-white p-4 rounded-xl border border-zinc-100 shadow-sm">
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">🔍 标题检索</label>
                            <input type="text" id="admin-filter-q" oninput="filterAdminTable()" class="w-full border border-zinc-200 rounded-lg px
