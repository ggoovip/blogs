<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blogs.nyc.mn - 数字花园</title>
    <!-- Tailwind CSS 与 官方排版插件 -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <!-- Highlight.js 代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <!-- Vditor 视觉编辑器 -->
    <link rel="stylesheet" href="https://unpkg.com/vditor/dist/index.css" />
    <script src="https://unpkg.com/vditor/dist/index.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        .code-block-wrapper { position: relative; }
        .copy-btn {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255, 255, 255, 0.08); color: #9ca3af;
            border: 1px solid rgba(156, 163, 175, 0.15); border-radius: 6px;
            padding: 4px 10px; font-size: 11px; cursor: pointer; transition: all 0.2s;
        }
        .copy-btn:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }
        
        /* Vditor 经典极简皮肤微调 */
        .vditor { border-color: #e4e4e7 !important; border-radius: 12px !important; }
        .vditor-toolbar { border-bottom-color: #f4f4f5 !important; background-color: #fafafa !important; border-radius: 12px 12px 0 0 !important; }
        .vditor-content { background: #fff !important; }
    </style>
</head>
<body class="bg-[#fcfcfc] text-zinc-800 min-h-screen flex flex-col antialiased">

    <!-- 导航栏 (原生 Hash 路由，一键清除过滤) -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-zinc-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="#/" class="flex items-center space-x-2">
                <span class="w-3.5 h-3.5 bg-indigo-600 rounded-full flex items-center justify-center animate-pulse"></span>
                <span id="nav-site-title" class="text-base font-bold tracking-tight text-zinc-900">blogs.nyc.mn</span>
            </a>
            <div class="flex items-center space-x-6 text-sm">
                <a href="#/" class="text-zinc-500 hover:text-indigo-600 font-medium transition-colors">首页</a>
                <a href="#/admin" class="bg-zinc-900 text-white hover:bg-zinc-800 px-3.5 py-1.5 rounded-lg text-xs font-semibold tracking-wide transition-all">后台管理</a>
            </div>
        </div>
    </nav>

    <!-- 主体自适应宽幅容器 -->
    <main class="flex-grow max-w-6xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <!-- 视图一：前台首页 -->
        <div id="home-view" class="space-y-8">
            <div class="border-b border-zinc-100 pb-8">
                <h1 id="site-title-display" class="text-3xl font-bold tracking-tight text-zinc-900 sm:text-4xl">正在加载...</h1>
                <p id="site-subtitle-display" class="text-zinc-500 text-sm mt-2 leading-relaxed"></p>
            </div>

            <!-- 搜索框与分类标签栏 -->
            <div class="space-y-4">
                <div class="flex flex-col sm:flex-row gap-4 justify-between items-start sm:items-center">
                    <div id="category-filter-container" class="flex flex-wrap gap-2"></div>
                    <div class="relative w-full sm:w-64 shrink-0">
                        <input type="text" id="search-input" onkeydown="handleSearch(event)" class="w-full border border-zinc-200 rounded-lg pl-3 pr-10 py-1.5 text-xs focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all" placeholder="输入关键字回车检索...">
                        <button onclick="triggerSearch()" class="absolute right-2.5 top-2 text-zinc-400 hover:text-zinc-600 text-xs">🔍</button>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <h2 class="text-[11px] font-bold uppercase tracking-wider text-zinc-400">最新发布</h2>
                <div id="posts-list-container" class="grid gap-6"></div>
            </div>
        </div>

        <!-- 视图二：教程详情页 -->
        <div id="post-view" class="hidden max-w-4xl mx-auto">
            <a href="#/" class="mb-8 inline-block text-xs font-semibold uppercase tracking-wider text-zinc-400 hover:text-indigo-600 flex items-center gap-1.5 transition-colors">
                ← 返回目录
            </a>
            <div class="mb-6 text-xs text-zinc-400 flex gap-4 border-b border-zinc-100 pb-4">
                <span id="post-date"></span>
                <span id="post-category" class="font-bold text-indigo-600"></span>
                <span id="post-views-count">阅读量: 加载中...</span>
            </div>
            <article id="post-content" class="prose prose-zinc prose-indigo max-w-none 
                prose-headings:font-bold prose-headings:tracking-tight
                prose-img:rounded-xl prose-img:shadow-md prose-img:mx-auto prose-img:border prose-img:border-zinc-100
                prose-pre:bg-[#0d1117] prose-pre:border prose-pre:border-zinc-800 prose-pre:rounded-xl prose-pre:p-0"></article>
        </div>

        <!-- 视图三：后台管理端 -->
        <div id="admin-view" class="space-y-8 hidden">
            <!-- 登录窗口 -->
            <div id="admin-login-card" class="max-w-md mx-auto bg-white p-8 rounded-2xl border border-zinc-200/60 shadow-md space-y-6 my-12">
                <div class="text-center">
                    <h2 class="text-xl font-bold text-zinc-900">管理后台登录</h2>
                    <p class="text-xs text-zinc-400 mt-1">请输入 D1 数据库中配置的管理密码解锁系统</p>
                </div>
                <div class="space-y-4">
                    <input type="password" id="admin-pass" class="w-full border border-zinc-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all" placeholder="请输入密码 (默认: admin123)">
                    <button onclick="verifyAndLogin()" class="w-full bg-zinc-900 hover:bg-zinc-800 text-white py-2.5 rounded-lg text-sm font-semibold transition-all">
                        确认解锁
                    </button>
                </div>
            </div>

            <!-- 控制面板（已登录） -->
            <div id="admin-panel" class="hidden space-y-8">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-6 rounded-xl border border-zinc-100 shadow-sm">
                    <div>
                        <span class="text-xs font-semibold text-emerald-600 bg-emerald-50 px-2 py-1 rounded">身份认证成功</span>
                        <h3 class="text-base font-bold text-zinc-900 mt-2">欢迎进入博客配置后台</h3>
                    </div>
                    <div class="flex flex-wrap gap-3 w-full md:w-auto">
                        <button onclick="showChangePasswordModal()" class="border border-zinc-200 hover:bg-zinc-50 text-zinc-600 px-4 py-1.5 rounded-lg text-xs font-semibold transition-colors">修改密码</button>
                        <button onclick="logoutAdmin()" class="bg-red-50 text-red-600 hover:bg-red-100 px-4 py-1.5 rounded-lg text-xs font-semibold transition-colors">登出后台</button>
                    </div>
                </div>

                <!-- 站点配置 -->
                <div class="bg-white p-6 rounded-xl border border-zinc-200/60 shadow-sm space-y-4">
                    <h3 class="text-base font-bold text-zinc-900 border-b border-zinc-100 pb-3 tracking-tight">自定义站点全局文案</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">主标题（如：无服务器数字花园）</label>
                            <input type="text" id="config-title" class="w-full border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">全局分类列表（用英文逗号隔开）</label>
                            <input type="text" id="config-categories" class="w-full border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all" placeholder="例如: 技术, 随笔, 教程">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">副标题 / 描述</label>
                        <input type="text" id="config-subtitle" class="w-full border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all">
                    </div>
                    <div class="flex justify-end pt-2 border-t border-zinc-100">
                        <button onclick="saveSiteConfig()" id="save-config-btn" class="bg-zinc-900 hover:bg-zinc-800 text-white px-5 py-2 rounded-lg text-xs font-semibold transition-all shadow-sm">
                            更新配置（瞬间生效）
                        </button>
                    </div>
                </div>

                <!-- 文章管理 -->
                <div class="bg-white p-6 rounded-xl border border-zinc-200/60 shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-base font-bold text-zinc-900 tracking-tight">文章列表管理</h3>
                        <button onclick="startNewPost()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-xs font-semibold transition-all shadow-sm">
                            + 撰写新教程
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm text-zinc-600">
                            <thead>
                                <tr class="border-b border-zinc-100 text-[11px] font-bold uppercase tracking-wider text-zinc-400">
                                    <th class="py-3">文章标题</th>
                                    <th class="py-3">分类</th>
                                    <th class="py-3">阅读量</th>
                                    <th class="py-3 text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody id="admin-posts-table"></tbody>
                        </table>
                    </div>
                </div>

                <!-- 编辑器工作区 -->
                <div id="editor-zone" class="bg-white p-6 rounded-xl border border-zinc-200/60 shadow-sm space-y-4">
                    <h3 id="editor-title" class="text-base font-bold text-zinc-900 border-b border-zinc-100 pb-3 tracking-tight">撰写新教程</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">唯一 ID (保存后不可改)</label>
                            <input type="text" id="admin-id" class="w-full border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all" placeholder="例如: advanced-markdown">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">文章标题</label>
                            <input type="text" id="admin-title" class="w-full border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">分类选择</label>
                            <select id="admin-category" class="w-full border border-zinc-200 rounded-lg px-3.5 h-10 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all bg-white">
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">文章摘要</label>
                        <input type="text" id="admin-summary" class="w-full border border-zinc-200 rounded-lg px-3.5 py-2 text-sm focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 focus:outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">正文 (WYSIWYG 模式：支持直接看图排版，工具栏可一键切源码 / 分屏 / 全屏)</label>
                        <div id="vditor-container" class="w-full"></div>
                    </div>
                    <div class="flex justify-end gap-3 pt-4 border-t border-zinc-100">
                        <button onclick="cancelEdit()" class="border border-zinc-200 hover:bg-zinc-50 text-zinc-600 px-5 py-2 rounded-lg text-sm font-medium transition-colors">
                            取消
                        </button>
                        <button onclick="publishPost()" id="publish-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg text-sm font-semibold transition-all shadow-sm">
                            直接发布（瞬间生效）
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- 修改密码弹窗 -->
    <div id="password-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-2xl w-80 shadow-lg space-y-4">
            <h3 class="text-base font-bold text-zinc-900">修改后台管理密码</h3>
            <input type="password" id="new-password" class="w-full border border-zinc-200 rounded-lg px-3 py-2 text-sm focus:outline-indigo-500" placeholder="请输入新密码">
            <div class="flex justify-end gap-2">
                <button onclick="closePasswordModal()" class="text-zinc-500 text-xs hover:underline px-3 py-1">取消</button>
                <button onclick="submitChangePassword()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-4 py-1.5 rounded-lg transition-all">确定修改</button>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-white border-t border-zinc-100 py-10 mt-auto text-xs text-zinc-400 tracking-wide">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center space-x-2">
                <span class="w-2 h-2 bg-emerald-500 rounded-full inline-block"></span>
                <span>blogs.nyc.mn • 自适应 6.0 闭环版</span>
            </div>
            <div class="text-[11px] text-zinc-400">
                Powered by <a href="https://pages.cloudflare.com" target="_blank" class="hover:underline text-indigo-500">Cloudflare Pages</a>
            </div>
        </div>
    </footer>

    <script>
        let vditorInstance = null;
        let R2_DOMAIN = "";
        let currentFilterCategory = ""; // 当前筛选分类
        let currentSearchQuery = "";     // 当前搜索词
        let activeCategories = [];       // 分类列表

        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        // 监听路由变化
        window.addEventListener('hashchange', handleRouting);
        
        // 页面首次载入
        window.addEventListener('load', async () => {
            await loadSiteConfig(); // 载入站点文案标题
            handleRouting();        // 执行路由定位
        });

        function handleRouting() {
            const hash = window.location.hash;
            if (hash === '#/admin') {
                showAdminView();
            } else if (hash.startsWith('#/post/')) {
                const postId = hash.replace('#/post/', '');
                loadPost(postId);
            } else {
                showHomeView(); // 首页或者 hash 为空时展现
            }
        }

        // 获取站点全局文案并安全容错
        async function loadSiteConfig() {
            try {
                const res = await fetch('./api/config?_t=' + Date.now());
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                const title = data.site_title || "Blogs.nyc.mn";
                const subtitle = data.site_subtitle || "无服务器数字花园";
                activeCategories = JSON.parse(data.site_categories || '["技术","教程","随笔","思考"]');

                // 渲染界面
                document.title = title;
                const navTitle = document.getElementById('nav-site-title');
                if (navTitle) navTitle.innerText = title;
                const siteTitle = document.getElementById('site-title-display');
                if (siteTitle) siteTitle.innerText = title;
                const siteSubtitle = document.getElementById('site-subtitle-display');
                if (siteSubtitle) siteSubtitle.innerText = subtitle;

                renderCategoryFilters();

                // 填充后台表单
                const cTitle = document.getElementById('config-title');
                if (cTitle) cTitle.value = title;
                const cSubtitle = document.getElementById('config-subtitle');
                if (cSubtitle) cSubtitle.value = subtitle;
                const cCats = document.getElementById('config-categories');
                if (cCats) cCats.value = activeCategories.join(', ');

                fillCategorySelect();
            } catch (err) {
                console.error("加载 D1 全局配置出错, 自动启动默认备份参数:", err);
                activeCategories = ["技术", "教程", "随笔", "思考"];
                document.title = "blogs.nyc.mn";
                renderCategoryFilters();
                fillCategorySelect();
            }
        }

        // 渲染主页分类药丸按钮
        function renderCategoryFilters() {
            const container = document.getElementById('category-filter-container');
            if (!container) return;
            container.innerHTML = `
                <button onclick="filterByCategory('')" class="px-3.5 py-1.5 rounded-full text-xs font-medium transition-all ${!currentFilterCategory ? 'bg-indigo-600 text-white shadow-sm' : 'bg-zinc-100 text-zinc-600 hover:bg-zinc-200/60'}">
                    全部
                </button>
            `;
            activeCategories.forEach(cat => {
                const isSelected = currentFilterCategory === cat;
                container.innerHTML += `
                    <button onclick="filterByCategory('${cat}')" class="px-3.5 py-1.5 rounded-full text-xs font-medium transition-all ${isSelected ? 'bg-indigo-600 text-white shadow-sm' : 'bg-zinc-100 text-zinc-600 hover:bg-zinc-200/60'}">
                        ${cat}
                    </button>
                `;
            });
        }

        function fillCategorySelect() {
            const select = document.getElementById('admin-category');
            if (!select) return;
            select.innerHTML = '';
            activeCategories.forEach(cat => {
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
            select.innerHTML += `<option value="未分类">未分类</option>`;
        }

        async function filterByCategory(cat) {
            currentFilterCategory = cat;
            renderCategoryFilters();
            await fetchPostsAndRender();
        }

        async function handleSearch(e) {
            if (e.key === 'Enter') {
                await triggerSearch();
            }
        }

        async function triggerSearch() {
            currentSearchQuery = document.getElementById('search-input').value.trim();
            await fetchPostsAndRender();
        }

        // 【安全修复】：展现主页时，清空之前所有的筛选状态，确保打开时默认加载“全部”
        async function showHomeView() {
            currentFilterCategory = ""; // 清空分类
            currentSearchQuery = "";     // 清空搜索词
            const sInput = document.getElementById('search-input');
            if (sInput) sInput.value = ""; // 清空搜索框文字

            renderCategoryFilters(); // 刷新分类过滤器样式（使“全部”重新高亮）

            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('post-view').classList.add('hidden');
            document.getElementById('admin-view').classList.add('hidden');
            
            await fetchPostsAndRender(); // 载入无筛选条件下的完整列表
        }

        async function fetchPostsAndRender() {
            const container = document.getElementById('posts-list-container');
            if (!container) return;
            container.innerHTML = '<p class="text-zinc-400 text-sm">正在加载中...</p>';

            try {
                let url = `./api/posts?_t=${Date.now()}`;
                if (currentFilterCategory) url += `&category=${encodeURIComponent(currentFilterCategory)}`;
                if (currentSearchQuery) url += `&q=${encodeURIComponent(currentSearchQuery)}`;

                const response = await fetch(url);
                const posts = await response.json();
                container.innerHTML = '';

                if (posts.length === 0) {
                    container.innerHTML = '<p class="text-zinc-400 text-sm py-12 text-center">当前分类下暂无发布内容。</p>';
                    return;
                }

                posts.forEach(post => {
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-xl border border-zinc-100 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all duration-300">
                            <span class="text-xs text-zinc-400 font-medium">${post.date} • <span class="text-indigo-600 font-bold">${post.category || '未分类'}</span> • 阅读量: ${post.views}</span>
                            <h3 class="text-lg font-bold mt-1.5 mb-2 hover:text-indigo-600 transition-colors"><a href="#/post/${post.id}">${post.title}</a></h3>
                            <p class="text-zinc-500 text-sm mb-4 leading-relaxed">${post.summary}</p>
                            <a href="#/post/${post.id}" class="text-xs font-semibold tracking-wider text-indigo-600 hover:text-indigo-700 uppercase">开始阅读 →</a>
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = `<p class="text-red-500 text-sm">获取文章数据失败，请确认数据库状态和后端配置。</p>`;
            }
        }

        async function loadPost(postId) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('admin-view').classList.add('hidden');
            document.getElementById('post-view').classList.remove('hidden');
            
            const postContent = document.getElementById('post-content');
            postContent.innerHTML = '<p class="text-zinc-400 text-sm">正在加载...</p>';

            try {
                const r2Base = R2_DOMAIN || `https://images.blogs.nyc.mn`;
                const response = await fetch(`${r2Base}/posts/${postId}.md?_t=` + Date.now());
                
                if (!response.ok) throw new Error();
                const text = await response.text();
                postContent.innerHTML = marked.parse(text);

                fetch(`./api/views?id=${postId}`, { method: 'POST' })
                    .then(r => r.json())
                    .then(data => {
                        document.getElementById('post-views-count').innerText = `阅读量: ${data.views}`;
                    }).catch(() => {
                        document.getElementById('post-views-count').innerText = `阅读量: -`;
                    });

                addCopyButtons();
                document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            } catch (err) {
                postContent.innerHTML = '<p class="text-red-500 text-sm">无法从 R2 载入文章，请确保跨域策略配置成功。</p>';
            }
        }

        function showAdminView() {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('post-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
            
            const password = getActivePassword();
            if (password) {
                document.getElementById('admin-login-card').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                refreshAdminTable();
                initVditor();
            } else {
                document.getElementById('admin-login-card').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
            }
        }

        async function verifyAndLogin() {
            const password = document.getElementById('admin-pass').value;
            if (!password) { alert('密码不可为空'); return; }

            try {
                const res = await fetch('./api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: "login", password })
                });

                if (res.ok) {
                    sessionStorage.setItem('admin_password', password);
                    document.getElementById('admin-login-card').classList.add('hidden');
                    document.getElementById('admin-panel').classList.remove('hidden');
                    await refreshAdminTable();
                    initVditor();
                } else {
                    alert('验证失败');
                }
            } catch (err) {
                alert('登录异常: ' + err.message);
            }
        }

        function getActivePassword() { return sessionStorage.getItem('admin_password'); }

        function logoutAdmin() {
            sessionStorage.removeItem('admin_password');
            document.getElementById('admin-pass').value = '';
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('admin-login-card').classList.remove('hidden');
        }

        async function saveSiteConfig() {
            const password = getActivePassword();
            const title = document.getElementById('config-title').value.trim();
            const subtitle = document.getElementById('config-subtitle').value.trim();
            const categoriesStr = document.getElementById('config-categories').value.trim();
            const btn = document.getElementById('save-config-btn');

            if (!title) { alert('主标题不可为空'); return; }
            const categoriesArr = categoriesStr.split(',').map(c => c.trim()).filter(c => c.length > 0);

            btn.innerText = '正在提交...';
            btn.disabled = true;

            try {
                const res = await fetch('./api/config', {
                    method: 'POST',
                    headers: { 'Authorization': password, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        site_title: title,
                        site_subtitle: subtitle,
                        site_categories: categoriesArr
                    })
                });

                if (!res.ok) throw new Error();
                alert('配置修改成功！');
                await loadSiteConfig();
            } catch (e) {
                alert('修改失败');
            } finally {
                btn.innerText = '更新配置（瞬间生效）';
                btn.disabled = false;
            }
        }

        function showChangePasswordModal() { document.getElementById('password-modal').classList.remove('hidden'); }
        function closePasswordModal() { document.getElementById('password-modal').classList.add('hidden'); }

        async function submitChangePassword() {
            const password = getActivePassword();
            const newPassword = document.getElementById('new-password').value.trim();
            if (!newPassword) { alert('新密码不可为空'); return; }

            try {
                const res = await fetch('./api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: "change_password", password, newPassword })
                });

                if (res.ok) {
                    alert('后台密码已更新！');
                    closePasswordModal();
                    logoutAdmin();
                } else {
                    alert('修改失败');
                }
            } catch (err) {
                alert('修改出错: ' + err.message);
            }
        }

        function initVditor() {
            if (vditorInstance) return;
            vditorInstance = new Vditor('vditor-container', {
                height: 500,
                mode: 'wysiwyg',
                placeholder: "在此撰写您的教程...支持直接拖拽/粘帖截图自动无感上传至 R2 并排版呈现！",
                cache: { enable: false },
                toolbarConfig: { pin: true },
                toolbar: [
                    "emoji", "headings", "bold", "italic", "strike", "link", "|",
                    "list", "ordered-list", "check", "outdent", "indent", "|",
                    "quote", "line", "code", "inline-code", "insert-after", "insert-before", "|",
                    "table", "|",
                    "undo", "redo", "|",
                    "edit-mode", "html", "preview", "both", "fullscreen"
                ],
                upload: {
                    accept: 'image/*',
                    handler: async (files) => {
                        const file = files[0];
                        const url = await uploadImageViaVditor(file);
                        if (url) {
                            vditorInstance.insertValue(`![图片描述](${url})`);
                        }
                        return null;
                    }
                }
            });
        }

        async function uploadImageViaVditor(file) {
            const password = getActivePassword();
            const formData = new FormData();
            formData.append('image', file);

            try {
                const res = await fetch('./api/upload', {
                    method: 'POST',
                    headers: { 'Authorization': password },
                    body: formData
                });

                if (!res.ok) throw new Error(await res.text());
                const data = await res.json();

                const urlObj = new URL(data.url);
                R2_DOMAIN = urlObj.origin;

                return data.url;
            } catch (err) {
                alert('图片同步到 R2 存储桶失败: ' + err.message);
                return null;
            }
        }

        async function refreshAdminTable() {
            const tbody = document.getElementById('admin-posts-table');
            if (!tbody) return;
            tbody.innerHTML = '<tr><td colspan="4" class="py-4 text-center text-zinc-400 text-xs">正在读取数据库...</td></tr>';
            
            try {
                const response = await fetch('./api/posts?_t=' + Date.now());
                const posts = await response.json();
                tbody.innerHTML = '';

                if (posts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="py-4 text-center text-zinc-400 text-xs">暂无文章</td></tr>';
                    return;
                }

                posts.forEach(post => {
                    tbody.innerHTML += `
                        <tr class="border-b border-zinc-100 hover:bg-zinc-50/50 transition-colors">
                            <td class="py-3.5 font-semibold text-zinc-900">${post.title}</td>
                            <td class="py-3.5"><span class="bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded text-xs font-semibold">${post.category || '未分类'}</span></td>
                            <td class="py-3.5 text-xs text-zinc-400">${post.views}</td>
                            <td class="py-3.5 text-right space-x-3">
                                <button onclick="editPost('${post.id}', '${post.title}', '${post.summary}', '${post.category || '未分类'}')" class="text-indigo-600 hover:text-indigo-800 font-semibold text-xs transition-colors">编辑</button>
                                <button onclick="deletePost('${post.id}')" class="text-red-600 hover:text-red-800 font-semibold text-xs transition-colors">删除</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="4" class="py-4 text-center text-red-500 text-xs">列表加载失败。</td></tr>';
            }
        }

        function startNewPost() {
            isEditing = false;
            document.getElementById('admin-id').disabled = false;
            document.getElementById('admin-id').value = '';
            document.getElementById('admin-title').value = '';
            document.getElementById('admin-summary').value = '';
            document.getElementById('admin-category').value = activeCategories[0] || '未分类';
            vditorInstance.setValue('');
            document.getElementById('editor-title').innerText = '撰写新教程';
            document.getElementById('publish-btn').innerText = '直接发布（瞬间生效）';
            document.getElementById('editor-zone').scrollIntoView({ behavior: 'smooth' });
        }

        async function publishPost() {
            const password = getActivePassword();
            const id = document.getElementById('admin-id').value.trim();
            const title = document.getElementById('admin-title').value.trim();
            const summary = document.getElementById('admin-summary').value.trim();
            const category = document.getElementById('admin-category').value;
            const content = vditorInstance.getValue();
            const btn = document.getElementById('publish-btn');

            if (!id || !title || !content) {
                alert('请填写文章 ID、标题和正文');
                return;
            }

            btn.innerText = '正在同步至 D1 + R2...';
            btn.disabled = true;

            try {
                const res = await fetch('./api/posts', {
                    method: 'POST',
                    headers: { 'Authorization': password, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id, title, summary, content, category,
                        date: new Date().toISOString().split('T')[0]
                    })
                });

                if (!res.ok) throw new Error(await res.text());
                alert('文章发布成功！');
                
                await refreshAdminTable();
                startNewPost();
            } catch (err) {
                alert('发布失败: ' + err.message);
            } finally {
                btn.disabled = false;
            }
        }

        async function editPost(id, title, summary, category) {
            isEditing = true;
            document.getElementById('editor-title').innerText = `编辑教程: ${title}`;
            document.getElementById('publish-btn').innerText = '保存更新';
            
            const adminIdInput = document.getElementById('admin-id');
            adminIdInput.value = id;
            adminIdInput.disabled = true;
            
            document.getElementById('admin-title').value = title;
            document.getElementById('admin-summary').value = summary;
            document.getElementById('admin-category').value = category || '未分类';

            vditorInstance.setValue('正在从 R2 提取正文内容...');

            try {
                const r2Base = R2_DOMAIN || `https://images.blogs.nyc.mn`;
                const res = await fetch(`${r2Base}/posts/${id}.md?_t=` + Date.now());
                if (!res.ok) throw new Error();
                const text = await res.text();
                vditorInstance.setValue(text);
                document.getElementById('editor-zone').scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                alert('从 R2 读取正文失败');
                vditorInstance.setValue('');
            }
        }

        async function deletePost(id) {
            const password = getActivePassword();
            if (!confirm(`警告：该操作将同时清除 D1 中的该文章记录，并物理清除该文章引用的 R2 媒体文件，是否继续？`)) return;

            try {
                const res = await fetch('./api/delete', {
                    method: 'POST',
                    headers: { 'Authorization': password, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });

                if (!res.ok) throw new Error(await res.text());
                alert('文章和关联图片已完全物理销毁！');
                await refreshAdminTable();
            } catch (err) {
                alert('删除失败: ' + err.message);
            }
        }

        function cancelEdit() {
            startNewPost();
        }

        function addCopyButtons() {
            document.querySelectorAll('pre').forEach((preElement) => {
                if (preElement.parentElement.classList.contains('code-block-wrapper')) return;
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                preElement.parentNode.insertBefore(wrapper, preElement);
                wrapper.appendChild(preElement);

                const button = document.createElement('button');
                button.className = 'copy-btn';
                button.innerText = '复制';
                button.addEventListener('click', () => {
                    const code = preElement.querySelector('code').innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        button.innerText = '已复制';
                        setTimeout(() => button.innerText = '复制', 2000);
                    });
                });
                wrapper.appendChild(button);
            });
        }
    </script>
</body>
</html>
